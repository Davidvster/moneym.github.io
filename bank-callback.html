<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>MoneyM – Returning to the app…</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');

      :root {
        color-scheme: light dark;
        --accent: #16A34A;
        --bg: #FFFFFF;
        --surface: #FAFAFA;
        --border: #ECECEC;
        --text: #0A0A0A;
        --text-2: #6B6B6B;
        --btn-primary-bg: #0A0A0A;
        --btn-primary-fg: #FFFFFF;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0A0A0A;
          --surface: #141414;
          --border: #262626;
          --text: #FAFAFA;
          --text-2: #A3A3A3;
          --btn-primary-bg: #FAFAFA;
          --btn-primary-fg: #0A0A0A;
        }
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        font-family: 'Geist', -apple-system, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        max-width: 440px;
        margin: 24px;
        padding: 32px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        text-align: center;
      }
      h1 { font-size: 20px; font-weight: 600; margin: 0 0 8px; }
      p { font-size: 14px; color: var(--text-2); line-height: 1.5; margin: 0 0 20px; }
      .btn {
        display: inline-block;
        padding: 12px 24px;
        border-radius: 9999px;
        border: none;
        font: inherit;
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        cursor: pointer;
      }
      .btn-primary { background: var(--btn-primary-bg); color: var(--btn-primary-fg); }
      .btn-secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        margin-top: 12px;
      }
      .error { color: var(--text-2); }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Returning to MoneyM…</h1>
      <p id="message">Your bank authorization is complete. If the app doesn't open automatically, use the buttons below.</p>
      <a class="btn btn-primary" id="open-link" href="#">Open MoneyM</a>
      <br />
      <button class="btn btn-secondary" id="copy-btn" type="button">Copy link to paste in the app</button>
    </div>
    <script>
      (function () {
        var query = window.location.search;
        var appUrl = 'moneym://bank-callback' + query;
        document.getElementById('open-link').href = appUrl;
        document.getElementById('copy-btn').addEventListener('click', function () {
          navigator.clipboard.writeText(window.location.href).then(function () {
            document.getElementById('copy-btn').textContent = 'Copied!';
          });
        });
        if (query.indexOf('code=') >= 0) {
          window.location.replace(appUrl);
        } else {
          document.getElementById('message').textContent =
            'No authorization code found in this link. Please restart the bank connection from the MoneyM app.';
          document.getElementById('message').className = 'error';
        }
      })();
    </script>
  </body>
</html>
